# Peerbench peer set — canonical source.
#
# Sibling of data/ratios.csv. Replaces the hard-coded cert list in
# .github/workflows/daily-ingest.yml. `peerbench sync-peers` upserts these
# rows into the `institutions` table; `peerbench list-peers` emits cert
# arrays consumed by the ingest workflow.
#
# Anchor: exactly one peer must set anchor = true.
# peer_tier = 1: head-to-head columns on the dashboard / statements view.
# peer_tier = 2: distribution-only — contributes to a "Larger peer median"
#                summary column, never selectable for head-to-head comparison.
#                (See docs/handoffs notes on Phase 5 scope decisions.)
#
# Cert numbers resolved 2026-05-25 via scripts/resolve_certs.py against
# FDIC /institutions; financial-filing-active confirmed via 2025-Q4
# /financials (Synovus, Cadence, Comerica report ACTIVE=0 on /institutions
# despite recent filings — appears to be stale FDIC metadata).

[[peers]]
cert      = 4063
name      = "MidFirst Bank"
state     = "OK"
peer_tier = 1
anchor    = true

